name: OpenAPI Validation

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint OpenAPI
        run: docker run --rm -v "$PWD":/work -w /work redocly/cli:latest lint docs/openapi.yaml
      - name: Build JSON
        run: |
          mkdir -p .openapi
          docker run --rm -v "$PWD":/work -w /work redocly/cli:latest bundle docs/openapi.yaml -o .openapi/openapi.generated.json
      - name: Check JSON in sync
        run: diff -u docs/openapi.json .openapi/openapi.generated.json || (echo "::error file=docs/openapi.json::JSON not in sync with YAML" && exit 1)
      - name: Cleanup
        if: always()
        run: rm -f .openapi/openapi.generated.json

