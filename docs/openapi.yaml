openapi: 3.1.0
info:
  title: Go License API
  version: 1.0.0
  description: |
    High-performance multi-tenant license validation service.
    Data Plane under `/licenses/*`, Control Plane under `/admin/*`.
servers:
  - url: http://localhost:8080
    description: Local
paths:
  /:
    get:
      summary: Landing page
      operationId: getHome
      responses:
        '200':
          description: OK
  /health:
    get:
      summary: Liveness check
      operationId: getHealth
      responses:
        '200':
          description: OK
  /healthz:
    get:
      summary: Liveness check (k8s)
      operationId: getHealthz
      responses:
        '200':
          description: OK
  /readyz:
    get:
      summary: Readiness check
      operationId: getReadyz
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /licenses/validate:
    post:
      summary: Validate a license
      description: Constant-time cache lookup. No DB calls on hot path.
      operationId: postLicenseValidate
      security:
        - TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateRequest'
            examples:
              example:
                value:
                  license_key: "LIC-ABC-123"
                  product_id: "prod_xxxxxxxx"
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /licenses/activate:
    post:
      summary: Activate a license
      description: Queued; executed by worker pool.
      operationId: postLicenseActivate
      security:
        - TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivationRequest'
      responses:
        '202':
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationAccepted'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /licenses/deactivate:
    post:
      summary: Deactivate a license
      description: Queued; executed by worker pool.
      operationId: postLicenseDeactivate
      security:
        - TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeactivationRequest'
      responses:
        '202':
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeactivationAccepted'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /licenses/usage:
    post:
      summary: Record usage units
      description: Queued; executed by worker pool.
      operationId: postLicenseUsage
      security:
        - TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageRequest'
      responses:
        '202':
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageAccepted'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /licenses/{key}/signed:
    get:
      summary: Fetch a signed offline license envelope
      description: Available when signerRegistry is configured. Public cache-only endpoint. Returns a detached-signature JSON envelope (`payload` + `signature`).
      operationId: getSignedLicense
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Signed license envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignedLicenseEnvelope'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /.well-known/jwks.json:
    get:
      summary: JWKS for signature verification
      description: Available when signerRegistry is configured.
      operationId: getJWKS
      responses:
        '200':
          description: JWKS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKS'
  /admin:
  /admin/revocations:
    get:
      summary: List license revocations
      description: Returns a compact list of revoked licenses for offline distribution. Admin protected.
      operationId: getRevocations
      parameters:
        - in: query
          name: since
          schema:
            type: string
            format: date-time
          description: Return revocations with revoked_at >= since
        - in: query
          name: limit
          schema:
            type: integer
          description: Max items (default 1000, max 5000)
      responses:
        '200':
          description: Revocations
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        revocation_id: { type: string }
                        license_id: { type: string }
                        revoked_at: { type: string, format: date-time }
                        reason: { type: string }
                  count:
                    type: integer
    get:
      summary: Admin status
      operationId: getAdminStatus
      security:
        - AdminKey: []
      responses:
        '200':
          description: OK
  /admin/tenants:
    post:
      summary: Create tenant
      operationId: postCreateTenant
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
  /admin/licenses/revoke:
    post:
      summary: Revoke license
      operationId: postRevokeLicense
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeRequest'
      responses:
        '200':
          description: Revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
  /admin/tenants/{id}/suspend:
    post:
      summary: Suspend tenant
      operationId: postSuspendTenant
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
  /admin/tenants/{id}/reinstate:
    post:
      summary: Reinstate tenant
      operationId: postReinstateTenant
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reinstated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
  /admin/tenants/{id}/ip-allowlist:
    post:
      summary: Update tenant IP allowlist
      operationId: postUpdateTenantIPAllowlist
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIPAllowlistRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
  /admin/tenants/{id}/webhooks:
    post:
      summary: Register tenant webhook
      operationId: postRegisterTenantWebhook
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterWebhookRequest'
      responses:
        '201':
          description: Created
  /admin/tenants/{id}/rotate-key:
    post:
      summary: Rotate tenant key
      operationId: postRotateTenantKey
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
  /admin/tenants/{id}/limits:
    patch:
      summary: Update tenant limits
      operationId: patchUpdateTenantLimits
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLimitsRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
  /admin/tenants/{id}:
    delete:
      summary: Delete tenant
      operationId: deleteTenant
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
  /admin/audit-log:
    get:
      summary: Query audit log
      operationId: getAuditLog
      security:
        - AdminKey: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        '200':
          description: Results
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
components:
  securitySchemes:
    AdminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
    TenantAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
          enum:
            - license_not_active
            - license_expired
            - license_not_found
            - rate_limited
            - unauthorized
            - forbidden
            - validation_failed
        message:
          type: string
      required: [code, message]
      example:
        code: license_expired
        message: License expired on 2026-01-01
    ValidateRequest:
      type: object
      properties:
        license_key:
          type: string
          description: Preferred field; alias 'key' also accepted
        key:
          type: string
          description: Deprecated alias for license_key
        product_id:
          type: string
          description: Preferred field; alias 'product' also accepted
        product:
          type: string
          description: Deprecated alias for product_id
      required: [license_key]
    ValidateResponse:
      type: object
      properties:
        valid:
          type: boolean
        license:
          $ref: '#/components/schemas/ValidationMeta'
        error:
          $ref: '#/components/schemas/Error'
      required: [valid]
      description: On invalid responses, clients should treat `license` as null/absent and use `error` for state.
    ValidationMeta:
      type: object
      properties:
        license_id:
          type: string
        status:
          type: string
        type:
          type: string
          enum: [plan, product]
        plan_id:
          type: string
        plan:
          $ref: '#/components/schemas/ValidationRef'
        product:
          $ref: '#/components/schemas/ValidationRef'
          nullable: true
        product_id:
          type: string
          nullable: true
        not_before:
          type: string
          format: date-time
          nullable: true
          description: License is invalid before this time. Clients SHOULD allow ±5 minutes clock skew.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: License expiry timestamp. Clients SHOULD allow ±5 minutes clock skew.
        seats_total:
          type: integer
          nullable: true
        unlimited_seats:
          type: boolean
        trial:
          type: boolean
        grace_period_ends_at:
          type: string
          format: date-time
          nullable: true
          description: Set when grace-period information is available. For `license_in_grace_period`, this is non-null.
        features:
          type: array
          items:
            type: string
        version:
          type: integer
        in_grace_period:
          type: boolean
    ValidationRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required: [id]
    ActivationRequest:
      type: object
      properties:
        license_key:
          type: string
          description: Preferred; alias 'key' accepted
        key:
          type: string
          description: Deprecated alias for license_key
        client_id:
          type: string
          description: Client identifier
        hostname:
          type: string
      required: [license_key]
      example:
        license_key: LIC-ABC-123
        client_id: sha256-of-hardware-fingerprint
        hostname: workstation-42
    ActivationAccepted:
      type: object
      properties:
        requestId:
          type: string
        status:
          type: string
          enum: [accepted]
      required: [requestId, status]
    DeactivationRequest:
      type: object
      properties:
        license_key:
          type: string
          description: Preferred; alias 'key' accepted
        key:
          type: string
          description: Deprecated alias for license_key
        client_id:
          type: string
      required: [license_key]
      example:
        license_key: LIC-ABC-123
        client_id: sha256-of-hardware-fingerprint
    DeactivationAccepted:
      type: object
      properties:
        requestId:
          type: string
        status:
          type: string
          enum: [accepted]
      required: [requestId, status]
    UsageRequest:
      type: object
      properties:
        license_key:
          type: string
          description: Preferred; alias 'key' accepted
        key:
          type: string
          description: Deprecated alias for license_key
        units:
          type: integer
        event_id:
          type: string
      required: [license_key, units]
      example:
        license_key: LIC-ABC-123
        units: 10
    UsageAccepted:
      type: object
      properties:
        requestId:
          type: string
        status:
          type: string
          enum: [accepted]
      required: [requestId, status]
    SignedLicenseEnvelope:
      type: object
      properties:
        payload:
          type: string
          description: Canonical JSON string of SignedLicensePayload.
        signature:
          type: string
          description: Base64-encoded Ed25519 signature over raw payload bytes.
        kid:
          type: string
        issuer:
          type: string
      required: [payload, signature, kid, issuer]
    SignedLicensePayload:
      type: object
      properties:
        license_id:
          type: string
        license_key:
          type: string
        type:
          type: string
          enum: [plan, product]
        tenant_id:
          type: string
        plan_id:
          type: string
        product_id:
          type: string
        status:
          type: string
        expires_at:
          type: string
          format: date-time
        not_before:
          type: string
          format: date-time
          description: Activation lower bound. Clients SHOULD allow ±5 minutes clock skew.
        issued_at:
          type: string
          format: date-time
        seats_total:
          type: integer
        seats_used:
          type: integer
        features:
          type: array
          items:
            type: string
        activation_id:
          type: string
          description: Optional soft-binding to a specific activation record.
        client_id:
          type: string
          description: Optional client identifier (e.g., SHA-256 of hardware fingerprint). If present, clients SHOULD verify it matches local device.
        binding_required:
          type: boolean
          description: When true, clients MUST reject if local device fingerprint ≠ client_id.
        max_offline_duration:
          type: integer
          format: int32
          description: Maximum seconds a client may rely on this payload without online revalidation. 0 means no limit.
        jti:
          type: string
          description: Unique token id per issuance for replay detection when online.
        schema_version:
          type: integer
          format: int32
          description: Payload schema version for forward-compat clients.
        revocation_id:
          type: string
          description: Stable per-license revocation identifier for offline revocation lists.
        kid:
          type: string
        issuer:
          type: string
      required: [license_id, license_key, type, tenant_id, status, not_before, issued_at, features, kid, issuer]
    CreateTenantRequest:
      type: object
      properties:
        name:
          type: string
        contactEmail:
          type: string
      required: [name]
    UpdateIPAllowlistRequest:
      type: object
      properties:
        cidrs:
          type: array
          items:
            type: string
    UpdateLimitsRequest:
      type: object
      properties:
        rateLimitPerMinute:
          type: integer
        maxActivations:
          type: integer
    RegisterWebhookRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        secret:
          type: string
      required: [url]
    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        contactEmail:
          type: string
        suspended:
          type: boolean
      required: [id, name, suspended]
    ActionResult:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]
    RevokeRequest:
      type: object
      properties:
        tenant_id:
          type: string
        license_key:
          type: string
          description: Preferred; alias 'key' accepted
        key:
          type: string
          description: Deprecated alias for license_key
        reason:
          type: string
      required: [tenant_id, license_key]
    AuditEvent:
      type: object
      properties:
        id:
          type: string
        time:
          type: string
          format: date-time
        actor:
          type: string
        action:
          type: string
        details:
          type: object
          additionalProperties: true
    JWKS:
      type: object
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kid:
                type: string
              issuer:
                type: string
              kty:
                type: string
                enum: [OKP]
              crv:
                type: string
                enum: [Ed25519]
              alg:
                type: string
                enum: [EdDSA]
              x:
                type: string
            required: [kid, issuer, kty, crv, alg, x]
security: []

